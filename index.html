<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAMING TIME</title>
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>
    <div class="game">
    <h1>Tosh qaychi qog'oz</h1>

    <div class="choices">
        <div class="card select-btn" data-value="0">
            
            <p>Tosh</p>
        </div>

        <div class="card select-btn" data-value="1">
            
            <p>Qaychi</p>
        </div>

        <div class="card select-btn" data-value="2">
            
            <p>Qog'oz</p>
        </div>
    </div>

    <div class="result">
        <h2 id="resultText">Tanlovni boshlang</h2>
        <p id="choiceText"></p>
    </div>

    <div class="score">
        <p>Teng: <span id="teng">0</span></p>
        <p>Siz: <span id="user">0</span></p>
        <p>Kompyuter: <span id="computer">0</span></p>
    </div>

    <button id="resetBtn">Reset</button>
    <script src="./"></script>
</div>
</body>
</html>
